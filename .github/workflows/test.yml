name: Everest Config Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - "everest_config/**"
      - "tests/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "everest_config/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Everest-only dependencies
        run: |
          python -m pip install --upgrade pip
          pip install crewai pyyaml pytest
      - name: Run Everest smoke tests (skip upstream CrewAI conftest)
        run: pytest tests/test_crews.py -v --noconftest --override-ini="addopts="
