name: Everest Config Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - "everest_config/**"
      - "tests/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Everest-only deps
        run: |
          python -m pip install --upgrade pip
          pip install crewai pyyaml pytest
      - name: Run isolated smoke tests (bypass upstream conftest)
        run: |
          mkdir -p /tmp/everest-tests
          cp tests/test_crews.py /tmp/everest-tests/
          touch /tmp/everest-tests/conftest.py
          cd /tmp/everest-tests
          PYTHONPATH="$GITHUB_WORKSPACE" pytest test_crews.py -v -c /dev/null
